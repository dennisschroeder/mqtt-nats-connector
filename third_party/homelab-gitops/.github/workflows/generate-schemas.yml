name: Generate Go Code from Protobuf

on:
  push:
    branches:
      - main
    paths:
      - 'schemas/proto/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
        contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install Protoc-Gen-Go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate Code
        run: |
          mkdir -p gen/go
          protoc --go_out=gen/go --go_opt=paths=source_relative \
                 --proto_path=schemas/proto \
                 schemas/proto/iot/v1/*.proto

      - name: Commit and Push Generated Code
        run: |
          git config --global user.name "IoT Engineer Agent"
          git config --global user.email "iot@dennisschroeder.me"
          git add gen/go
          git commit -m "chore: auto-generate Go code from protobuf" || exit 0
          git push

apiVersion: apps/v1
kind: Deployment
metadata:
  name: asto-waste2mqtt
  namespace: iot
  labels:
    app: asto-waste2mqtt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asto-waste2mqtt
  template:
    metadata:
      labels:
        app: asto-waste2mqtt
    spec:
      containers:
      - name: service
        image: ghcr.io/dennisschroeder/asto-waste2mqtt:1.0.3
        args:
        - "--mqtt-host=mosquitto.mqtt.svc.cluster.local"
        - "--district-id=57589"
        - "--log-level=info"
        imagePullPolicy: Always
      imagePullSecrets:
      - name: ghcr-secret

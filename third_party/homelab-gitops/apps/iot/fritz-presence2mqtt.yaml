apiVersion: apps/v1
kind: Deployment
metadata:
  name: fritz-presence2mqtt
  namespace: iot
  labels:
    app: fritz-presence2mqtt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fritz-presence2mqtt
  template:
    metadata:
      labels:
        app: fritz-presence2mqtt
    spec:
      containers:
      - name: bridge
        image: ghcr.io/dennisschroeder/fritz-presence2mqtt:1.0.2
        args:
        - "--fritz-host=192.168.178.1"
        - "--fritz-user=vectoholic"
        - "--fritz-password=$(FRITZ_PASSWORD)"
        - "--mqtt-host=mosquitto.mqtt.svc.cluster.local"
        - "--devices=Alice_Iphone:EA:82:25:CF:58:2A,Dennis_Iphone:CA:16:A2:E5:99:27,Isabel_Iphone:A2:F5:A4:F6:26:F7,Juergen_Iphone:6A:33:FF:CE:DE:31,Ben_Iphone:76:72:3B:AD:BA:4E"
        - "--poll-interval=60s"
        - "--consider-home-duration=1m"
        - "--log-level=info"
        env:
        - name: FRITZ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fritzbox-secret
              key: password
        imagePullPolicy: Always
      imagePullSecrets:
      - name: ghcr-secret

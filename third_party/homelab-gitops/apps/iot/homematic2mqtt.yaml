apiVersion: apps/v1
kind: Deployment
metadata:
  name: homematic2mqtt
  namespace: iot
  labels:
    app: homematic2mqtt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homematic2mqtt
  template:
    metadata:
      labels:
        app: homematic2mqtt
    spec:
      hostNetwork: true
      containers:
      - name: bridge
        image: ghcr.io/dennisschroeder/homematic2mqtt:v1.0.3
        args:
        - "--ccu-address=192.168.178.29"
        - "--callback-ip=$(NODE_IP)"
        - "--callback-port=8081"
        - "--mqtt-host=10.99.214.11"
        - "--log-level=info"
        env:
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        imagePullPolicy: Always
      imagePullSecrets:
      - name: ghcr-secret

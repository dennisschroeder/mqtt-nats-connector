apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-nats-connector
  namespace: iot
  labels:
    app: mqtt-nats-connector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt-nats-connector
  template:
    metadata:
      labels:
        app: mqtt-nats-connector
    spec:
      containers:
      - name: service
        image: ghcr.io/dennisschroeder/mqtt-nats-connector:1.0.0
        args:
        - "--nats-url=nats://nats.event-bus:4222"
        - "--mqtt-broker=tcp://mosquitto.iot:1883"
        - "--topics=presence/#,waste/#,stiebel/#"
        - "--log-level=debug"
        imagePullPolicy: Always
      imagePullSecrets:
      - name: ghcr-secret

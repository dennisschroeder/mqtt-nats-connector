
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ha-backup-sync
  namespace: homeassistant
spec:
  schedule: "0 3 * * *" # Täglich um 3 Uhr nachts
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: rclone
            image: rclone/rclone:latest
            args:
            - "sync"
            - "/config"
            - "crypt:"
            - "--config"
            - "/etc/rclone/rclone.conf"
            - "--verbose"
            volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: rclone-config
              mountPath: /etc/rclone
              readOnly: true
          restartPolicy: OnFailure
          volumes:
          - name: config
            persistentVolumeClaim:
              claimName: homeassistant-config
          - name: rclone-config
            secret:
              secretName: rclone-config

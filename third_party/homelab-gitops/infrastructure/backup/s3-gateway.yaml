apiVersion: v1
kind: Namespace
metadata:
  name: backup-system
---
apiVersion: v1
kind: Secret
metadata:
  name: rclone-config
  namespace: backup-system
type: Opaque
stringData:
  rclone.conf: |
    [storagebox]
    type = sftp
    host = u562552.your-storagebox.de
    user = u562552
    pass = VVT32CFIxupGu09lPpp291hRFzm7B9AgYAtgkl-5zvlLK2Y
    use_insecure_cipher = false

    [crypt]
    type = crypt
    remote = storagebox:backup/longhorn
    password = TDQ3J1fYVLqhtfXIBIomOxwemVHjT89464IItxJCV2U
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rclone-s3-gateway
  namespace: backup-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rclone-s3-gateway
  template:
    metadata:
      labels:
        app: rclone-s3-gateway
    spec:
      containers:
      - name: rclone
        image: rclone/rclone:latest
        args:
        - "serve"
        - "s3"
        - "storagebox:backup/longhorn"
        - "--config"
        - "/etc/rclone/rclone.conf"
        - "--addr"
        - "0.0.0.0:8080"
        - "--vfs-cache-mode"
        - "writes"
        - "--auth-key"
        - "longhorn,CrushLonghornS3Key123"
        - "--cache-dir"
        - "/tmp/rclone-cache"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: rclone-config
          mountPath: /etc/rclone
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: rclone-config
        secret:
          secretName: rclone-config
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: s3-gateway
  namespace: backup-system
spec:
  selector:
    app: rclone-s3-gateway
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: v1
kind: Secret
metadata:
  name: longhorn-backup-secret
  namespace: longhorn-system
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: longhorn
  AWS_SECRET_ACCESS_KEY: CrushLonghornS3Key123
  AWS_ENDPOINTS: http://s3-gateway.backup-system.svc.cluster.local:80

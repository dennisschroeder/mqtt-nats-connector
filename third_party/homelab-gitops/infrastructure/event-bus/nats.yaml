apiVersion: v1
kind: Namespace
metadata:
  name: event-bus
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nats-js-pvc
  namespace: event-bus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: event-bus
  labels:
    app: nats
spec:
  serviceName: nats
  replicas: 3
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
      - name: nats
        image: nats:2.10-alpine
        args:
          - "-js"
          - "-sd"
          - "/data"
          - "-m"
          - "8222"
          - "-n"
          - "$(POD_NAME)"
          - "--cluster_name"
          - "nats"
          - "--cluster_listen"
          - "nats://0.0.0.0:6222"
          - "--routes"
          - "nats://nats-0.nats.event-bus.svc.cluster.local:6222,nats://nats-1.nats.event-bus.svc.cluster.local:6222,nats://nats-2.nats.event-bus.svc.cluster.local:6222"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        ports:
        - name: client
          containerPort: 4222
        - name: cluster
          containerPort: 6222
        - name: monitor
          containerPort: 8222
        volumeMounts:
        - name: data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "longhorn"
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: event-bus
spec:
  selector:
    app: nats
  ports:
  - name: client
    port: 4222
    targetPort: 4222
  - name: cluster
    port: 6222
    targetPort: 6222
  - name: monitor
    port: 8222
    targetPort: 8222
  clusterIP: None

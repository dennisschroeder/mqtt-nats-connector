apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gateway-mdns
  namespace: default
spec:
  selector:
    matchLabels:
      app: gateway-mdns
  template:
    metadata:
      labels:
        app: gateway-mdns
    spec:
      hostNetwork: true
      containers:
      - name: publisher
        image: python:3.11-alpine
        command:
        - /bin/sh
        - -c
        - |
          pip install --no-cache-dir zeroconf
          cat << 'EOF' > publish.py
          import time
          import socket
          from zeroconf import IPVersion, ServiceInfo, Zeroconf

          ip = socket.inet_aton("192.168.178.245")
          zc = Zeroconf(ip_version=IPVersion.V4Only)

          services = [
              ServiceInfo("_http._tcp.local.", "Home Assistant Gateway._http._tcp.local.", addresses=[ip], port=80, server="ha.local."),
              ServiceInfo("_http._tcp.local.", "Grafana Gateway._http._tcp.local.", addresses=[ip], port=80, server="grafana.local."),
              ServiceInfo("_http._tcp.local.", "Loki Gateway._http._tcp.local.", addresses=[ip], port=80, server="loki.local."),
              ServiceInfo("_http._tcp.local.", "Longhorn Gateway._http._tcp.local.", addresses=[ip], port=80, server="longhorn.local.")
          ]

          print("Starting mDNS publisher for Gateway API...")
          for s in services:
              zc.register_service(s)

          try:
              while True:
                  time.sleep(60)
          except KeyboardInterrupt:
              pass
          finally:
              for s in services:
                  zc.unregister_service(s)
              zc.close()
          EOF
          python3 publish.py
